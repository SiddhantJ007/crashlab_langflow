services:
  - type: web
    name: langflow-feedback-service
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: LANGFLOW_HOST
        value: 0.0.0.0
      - key: LANGFLOW_AUTO_LOGIN
        value: false
